<!DOCTYPE html>
<html><head><title>Icon Generator</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  // Background
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, s, s);
  // Glow circle
  const grad = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
  grad.addColorStop(0, 'rgba(0,240,255,0.15)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, s, s);
  // Text
  ctx.fillStyle = '#00f0ff';
  ctx.font = `bold ${s * 0.35}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = '#00f0ff';
  ctx.shadowBlur = s * 0.05;
  ctx.fillText('ONI', s/2, s/2);
  // Download
  const link = document.createElement('a');
  link.download = `icon-${s}.png`;
  link.href = canvas.toDataURL();
  link.click();
}
drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));
document.body.innerHTML = '<h2>Icons generated! Check downloads.</h2><p>Place icon-192.png and icon-512.png in this folder.</p>';
</script>
</body></html>
